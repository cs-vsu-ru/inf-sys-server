name: Redeploy Image on Dev

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: self-hosted

    steps:
      - name: Login to GitHub Container Registry
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Redeploy containers
        shell: bash
        run: |
          set -e
          cd /dev-server
          docker compose pull
          docker compose up -d --build
          docker ps