name: Redeploy Image on Dev

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: dev

    steps:
      - name: Login to GitHub Container Registry
        shell: bash
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Redeploy containers
        shell: bash
        run: |
          set -e
          cd /dev-server
          docker compose pull
          docker compose build --pull --no-cache
          docker compose up -d
          docker ps