name: Redeploy Image on Host

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: self-hosted

    steps:
      - name: Redeploy containers
        shell: bash
        run: |
          echo "Checking directory..."
          ls -la /dev-server/ || { echo "Directory /dev-server not found"; exit 1; }
          cd /dev-server
          echo "Pulling images..."
          docker compose pull
          echo "Starting containers..."
          docker compose up -d
          docker ps